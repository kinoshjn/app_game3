services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  web:
    build: .
    environment:
      POSTGRES_PASSWORD: password
      DB_HOST: db
      TZ: Asia/Tokyo
    command: >
      bash -c "
        bundle install &&
        bundle exec rails db:create db:migrate &&
        rm -f tmp/pids/server.pid &&
        yarn install &&
        ./bin/dev
      "
    tty: true
    stdin_open: true
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle:cached
      - node_modules:/app/node_modules

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_data:
  node_modules: